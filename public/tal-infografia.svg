<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Tech Archery Lab - Infografia de pantallas y funciones</title>
  <desc id="desc">Infografia visual de TAL con modulos de dashboard, atletas, entrenamientos, agenda, analytics, equipamiento, liga indoor, clubs, soporte deportivo y administracion.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#164e63" stop-opacity=".55"/>
      <stop offset="42%" stop-color="#0f172a" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172554" stop-opacity=".72"/>
      <stop offset="45%" stop-color="#0f172a" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#020617" stop-opacity=".96"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 .65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg-line{stroke:#164e63;stroke-width:1;opacity:.28}
      .card{fill:url(#card);stroke:#1e7490;stroke-width:1.4}
      .mini{fill:#020617;stroke:#1f4f63;stroke-width:1}
      .title{font:900 76px Arial, sans-serif;fill:#fff;letter-spacing:-2px}
      .subtitle{font:700 26px Arial, sans-serif;fill:#94a3b8}
      .eyebrow{font:900 16px Arial, sans-serif;fill:#67e8f9;letter-spacing:7px}
      .label{font:900 28px Arial, sans-serif;fill:#fff}
      .small{font:700 17px Arial, sans-serif;fill:#cbd5e1}
      .tiny{font:800 14px Arial, sans-serif;fill:#94a3b8}
      .chip{fill:#083344;stroke:#22d3ee;stroke-opacity:.35}
      .chipText{font:900 14px Arial, sans-serif;fill:#a5f3fc;letter-spacing:1px}
      .metric{font:900 30px Arial, sans-serif;fill:#67e8f9}
      .connector{stroke:#22d3ee;stroke-width:2;stroke-opacity:.38;fill:none}
      .iconStroke{stroke:#67e8f9;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <g opacity=".35">
    <path class="bg-line" d="M0 150H1920M0 300H1920M0 450H1920M0 600H1920M0 750H1920M0 900H1920"/>
    <path class="bg-line" d="M160 0V1080M320 0V1080M480 0V1080M640 0V1080M800 0V1080M960 0V1080M1120 0V1080M1280 0V1080M1440 0V1080M1600 0V1080M1760 0V1080"/>
  </g>

  <circle cx="1640" cy="150" r="230" fill="#22d3ee" opacity=".08"/>
  <circle cx="260" cy="930" r="260" fill="#2563eb" opacity=".12"/>

  <text x="90" y="96" class="eyebrow">TAL PRODUCT MAP</text>
  <text x="88" y="172" class="title">Tech Archery Lab</text>
  <text x="92" y="216" class="subtitle">Plataforma integral para clubes, coaches y atletas de tiro con arco</text>

  <g transform="translate(1390 72)">
    <rect width="430" height="160" rx="34" fill="#020617" stroke="#22d3ee" stroke-opacity=".32"/>
    <text x="32" y="48" class="eyebrow" style="letter-spacing:4px">ROLES</text>
    <g transform="translate(30 70)">
      <rect class="chip" width="110" height="42" rx="21"/><text x="24" y="28" class="chipText">Admin</text>
      <rect class="chip" x="130" width="110" height="42" rx="21"/><text x="154" y="28" class="chipText">Coach</text>
      <rect class="chip" x="260" width="120" height="42" rx="21"/><text x="282" y="28" class="chipText">Atleta</text>
    </g>
    <text x="34" y="138" class="tiny">Admin todo · Coach su club · Atleta su perfil</text>
  </g>

  <path class="connector" d="M960 255V315"/>
  <path class="connector" d="M480 350H1440"/>
  <path class="connector" d="M480 350V415M720 350V415M960 350V415M1200 350V415M1440 350V415"/>
  <path class="connector" d="M480 662V725M720 662V725M960 662V725M1200 662V725M1440 662V725"/>

  <g transform="translate(120 300)">
    <rect class="card" width="324" height="246" rx="30" filter="url(#glow)"/>
    <text x="28" y="48" class="label">Dashboard</text>
    <text x="30" y="78" class="tiny">Vista ejecutiva</text>
    <g transform="translate(30 105)">
      <rect class="mini" width="118" height="48" rx="16"/><text x="16" y="32" class="metric">800</text><text x="74" y="31" class="tiny">atletas</text>
      <rect class="mini" x="140" width="118" height="48" rx="16"/><text x="156" y="32" class="metric">50</text><text x="204" y="31" class="tiny">coaches</text>
      <rect class="mini" y="68" width="258" height="48" rx="16"/>
      <path d="M20 101 C60 74,92 118,132 92 S212 82,242 103" stroke="#22d3ee" stroke-width="5" fill="none"/>
    </g>
    <text x="30" y="220" class="small">KPIs · flechas · promedio · score</text>
  </g>

  <g transform="translate(468 300)">
    <rect class="card" width="324" height="246" rx="30"/>
    <text x="28" y="48" class="label">Atletas</text>
    <text x="30" y="78" class="tiny">Perfil deportivo completo</text>
    <circle cx="72" cy="132" r="38" fill="#0e7490" opacity=".55"/>
    <circle cx="72" cy="120" r="16" fill="#67e8f9"/>
    <path d="M38 172c12-34 56-34 68 0" fill="none" stroke="#67e8f9" stroke-width="8" stroke-linecap="round"/>
    <rect class="mini" x="128" y="105" width="150" height="20" rx="10"/>
    <rect class="mini" x="128" y="137" width="118" height="20" rx="10"/>
    <rect class="mini" x="128" y="169" width="132" height="20" rx="10"/>
    <text x="30" y="220" class="small">historial · contactos · metas</text>
  </g>

  <g transform="translate(816 300)">
    <rect class="card" width="324" height="246" rx="30"/>
    <text x="28" y="48" class="label">Entrenamientos</text>
    <text x="30" y="78" class="tiny">Captura oficial de series</text>
    <g transform="translate(34 106)">
      <rect class="mini" width="250" height="92" rx="18"/>
      <text x="20" y="32" class="tiny">Serie 1</text>
      <g fill="#67e8f9">
        <circle cx="24" cy="62" r="12"/><circle cx="62" cy="62" r="12"/><circle cx="100" cy="62" r="12"/><circle cx="138" cy="62" r="12"/><circle cx="176" cy="62" r="12"/><circle cx="214" cy="62" r="12"/>
      </g>
    </g>
    <text x="30" y="220" class="small">series · flechas · heatmap · notas</text>
  </g>

  <g transform="translate(1164 300)">
    <rect class="card" width="324" height="246" rx="30"/>
    <text x="28" y="48" class="label">Agenda</text>
    <text x="30" y="78" class="tiny">Semana de entrenamientos</text>
    <g transform="translate(32 108)">
      <rect class="mini" width="54" height="76" rx="16"/><rect class="mini" x="66" width="54" height="76" rx="16"/><rect class="mini" x="132" width="54" height="76" rx="16"/><rect class="mini" x="198" width="54" height="76" rx="16"/>
      <circle cx="27" cy="45" r="10" fill="#22d3ee"/><circle cx="159" cy="45" r="10" fill="#fde047"/>
    </g>
    <text x="30" y="220" class="small">programados · confirma · rechaza</text>
  </g>

  <g transform="translate(1512 300)">
    <rect class="card" width="288" height="246" rx="30"/>
    <text x="28" y="48" class="label">Analytics</text>
    <text x="30" y="78" class="tiny">Tendencias y rendimiento</text>
    <path d="M38 178V112M38 178H246" stroke="#1f4f63" stroke-width="4"/>
    <path d="M52 160 C86 128,118 145,150 120 S210 108,238 82" stroke="#67e8f9" stroke-width="7" fill="none" stroke-linecap="round"/>
    <text x="30" y="220" class="small">promedio · X count · distancia</text>
  </g>

  <g transform="translate(120 648)">
    <rect class="card" width="324" height="246" rx="30"/>
    <text x="28" y="48" class="label">Equipo y Tuning</text>
    <text x="30" y="78" class="tiny">Bitacora tecnica</text>
    <path class="iconStroke" d="M75 116c44 18 44 66 0 84M75 116c-28 32-28 52 0 84M75 116h86M75 200h86"/>
    <rect class="mini" x="178" y="116" width="92" height="26" rx="13"/>
    <rect class="mini" x="178" y="158" width="116" height="26" rx="13"/>
    <text x="30" y="220" class="small">arco · brace height · ajustes</text>
  </g>

  <g transform="translate(468 648)">
    <rect class="card" width="324" height="246" rx="30"/>
    <text x="28" y="48" class="label">Liga Indoor</text>
    <text x="30" y="78" class="tiny">Competencia interclubs</text>
    <circle cx="78" cy="150" r="58" fill="none" stroke="#f8fafc" stroke-width="7"/>
    <circle cx="78" cy="150" r="40" fill="none" stroke="#ef4444" stroke-width="7"/>
    <circle cx="78" cy="150" r="22" fill="#fde047"/>
    <rect class="mini" x="160" y="112" width="108" height="24" rx="12"/>
    <rect class="mini" x="160" y="150" width="128" height="24" rx="12"/>
    <text x="30" y="220" class="small">18 m · jornadas · puntos · PDF</text>
  </g>

  <g transform="translate(816 648)">
    <rect class="card" width="324" height="246" rx="30"/>
    <text x="28" y="48" class="label">Clubs</text>
    <text x="30" y="78" class="tiny">Organizacion por club</text>
    <path class="iconStroke" d="M56 188V118l72-44 72 44v70M96 188v-54h64v54"/>
    <circle cx="230" cy="118" r="24" fill="#22d3ee" opacity=".9"/>
    <circle cx="260" cy="160" r="24" fill="#67e8f9" opacity=".6"/>
    <text x="30" y="220" class="small">coaches · atletas · migracion</text>
  </g>

  <g transform="translate(1164 648)">
    <rect class="card" width="324" height="246" rx="30"/>
    <text x="28" y="48" class="label">Soporte deportivo</text>
    <text x="30" y="78" class="tiny">Contactos del club</text>
    <circle cx="82" cy="144" r="42" fill="#22d3ee" opacity=".2"/>
    <path class="iconStroke" d="M62 148h40M82 128v40"/>
    <circle cx="196" cy="144" r="42" fill="#a855f7" opacity=".2"/>
    <path class="iconStroke" d="M178 150c10-34 50-34 60 0M190 132c0-18 28-18 28 0"/>
    <text x="30" y="220" class="small">fisico · psicologia · contacto</text>
  </g>

  <g transform="translate(1512 648)">
    <rect class="card" width="288" height="246" rx="30"/>
    <text x="28" y="48" class="label">Admin</text>
    <text x="30" y="78" class="tiny">Acceso y notificaciones</text>
    <path class="iconStroke" d="M52 122h178v92H52zM52 122l89 62 89-62"/>
    <rect x="62" y="96" width="84" height="28" rx="14" fill="#22d3ee"/>
    <text x="75" y="115" style="font:900 13px Arial,sans-serif;fill:#020617">SMTP</text>
    <text x="30" y="220" class="small">invitaciones · roles · seguridad</text>
  </g>

  <g transform="translate(92 982)">
    <rect width="1736" height="52" rx="26" fill="#020617" stroke="#1e7490"/>
    <text x="32" y="34" class="small">Flujo central: Admin configura clubs e invitaciones · Coach gestiona su club y entrenamientos · Atleta consulta agenda, scorecards, analytics y equipo</text>
  </g>
</svg>
